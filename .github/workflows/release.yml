# Runs on version tags: publishes to PyPI and attaches standalone
# executables for every platform to the GitHub release.
#
# PyPI publishing uses trusted publishing (no token secrets): register this
# repo + workflow as a trusted publisher on pypi.org (project -> Publishing)
# before the first release, or the publish-pypi job fails while the
# executables still build and attach independently.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # setup-uv publishes no floating major tags since v8: pin exactly
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: '3.12'
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    # Created in repo Settings > Environments as part of the trusted
    # publisher setup; editor linters flag it until it exists on GitHub.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  build-executables:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: '3.12'
      - name: Install with GUI and packaging tools
        run: uv sync --extra gui --group release
      - name: Build executable pair
        run: uv run pyinstaller packaging/modsweep.spec
      - name: Smoke-test the frozen CLI
        shell: bash
        run: |
          exe=dist/modsweep/modsweep
          [ "${{ runner.os }}" = "Windows" ] && exe=dist/modsweep/modsweep.exe
          "$exe" --help
          # The riskiest freeze failure: bundled manifests must resolve from
          # inside the executable's package data.
          mkdir -p smoke/downloads
          echo "nolvus = ['bundled']" > smoke/modsweep.toml
          "$exe" report --config smoke/modsweep.toml \
            --downloads smoke/downloads --cache smoke/c.sqlite | grep -i nolvus
          if [ "${{ runner.os }}" = "Windows" ]; then
            # The portable single-file exe resolves the same package data
            # from its self-extracted temp dir - a separate code path.
            ./dist/modsweep.exe --help
            ./dist/modsweep.exe report --config smoke/modsweep.toml \
              --downloads smoke/downloads --cache smoke/c2.sqlite | grep -i nolvus
          fi
      - name: Package artifacts
        shell: bash
        run: |
          cd dist
          # onedir: one folder holding both executables and a shared
          # _internal (GitHub-only). The single-file exes zip individually:
          # the -gui zip is the NexusMods main file (GUI-forward users),
          # the -cli zip its optional companion for scripting.
          case "${{ runner.os }}" in
            Windows) 7z a "modsweep-${{ github.ref_name }}-windows.zip" modsweep
                     7z a "modsweep-${{ github.ref_name }}-windows-gui.zip" modsweep-gui.exe
                     7z a "modsweep-${{ github.ref_name }}-windows-cli.zip" modsweep.exe ;;
            macOS)   zip -r "modsweep-${{ github.ref_name }}-macos.zip" modsweep ;;
            # Linux ships twice: tar.gz for GitHub convention, plus a zip
            # for NexusMods (which only accepts zip/rar/7z). Info-ZIP
            # stores the exec bits, so standard extractors restore them.
            Linux)   tar czf "modsweep-${{ github.ref_name }}-linux.tar.gz" modsweep
                     zip -qr "modsweep-${{ github.ref_name }}-linux.zip" modsweep ;;
          esac
      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/modsweep-*.zip
            dist/modsweep-*.tar.gz
