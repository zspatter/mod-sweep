# Cross-platform is a standing requirement: Windows is the primary platform,
# Linux support matters, and macOS must not break - so the matrix covers all
# three natively plus Debian and Arch containers, on the oldest supported,
# current, and latest-available Python.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC: catch runner/toolchain drift
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.container || matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python: ['3.12', '3.14', '3'] # '3' = latest available CPython
        # '' = run natively on the runner. Debian/Arch have no hosted
        # runners, so they join as containers on ubuntu via the include
        # rows - which must contradict this key to spawn standalone jobs
        # (otherwise they would merely augment the native ubuntu/py3 job).
        container: ['']
        include:
          - { os: ubuntu-latest, python: '3', container: 'debian:latest' }
          - { os: ubuntu-latest, python: '3', container: 'archlinux:latest' }
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install project
        run: uv sync
      - name: Run tests
        run: uv run pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Ruff
        run: uvx ruff check src tests packaging
      - name: Pyright
        # gui extra so PySide6 types resolve; the dev group carries pyright
        run: |
          uv sync --extra gui
          uv run pyright

  # The unit suite fakes GitHub; the weekly run also checks the real API
  # contract the update paths depend on (manifest index, latest release).
  live-api:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3'
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/test_live_remote.py -q
        env:
          MODSWEEP_LIVE_TESTS: '1'

  # GitHub pauses cron-triggered workflows after ~60 days without repo
  # activity; the schedule alone cannot keep itself alive. Re-enabling an
  # already-enabled workflow resets that timer, so each scheduled run
  # renews its own lease - no dummy commits needed.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Reset the scheduled-workflow disable timer
        run: gh workflow enable ci.yml --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
